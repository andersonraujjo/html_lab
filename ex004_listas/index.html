<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testando as listas</title>
</head>
<body>

    <!--Lista não ordenada: UL (unordened list) / LI (list item)-->
    <ul>
        <p>Lista não ordenada</p>
        <li>HMTL</li>
        <li>CSS</li>
        <li>JAVASCRIPT</li>
    </ul>
    
    <hr> <!--ISSO AQUI É UM 'SEPARADOR'-->
    
    <!--Lista ordenada: OL (ordened list)-->
    <ol>
        <p>Lista ordenada</p>
        <li>Abrir editor</li>
        <li>Criar</li>
        <li>Escrever HTML</li>
    </ol>

    <hr> <!--ISSO AQUI É UM 'SEPARADOR'-->

    <!--O mais chato de todos, lista de definição:
    DL (definition list) / DT (definition term) / DD (definition description)-->
    <dl>
        <p>Lista de definição</p>
        <dt><strong>HTML</strong></dt>
        <dd>Linguagem de marcação</dd>
        <dt><strong>CSS</strong></dt>
        <dd>Estilos Visuais</dd>
        <dt><strong>C#</strong></dt>
        <dd>Linguagem back-end</dd>
    </dl>

    <hr> <!--ISSO AQUI É UM 'SEPARADOR'-->


</body>
</html>
